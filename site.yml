---
- name: Configureer Homelab Server
  hosts: homeserver
  become: yes
  gather_facts: yes

  # 🔍 Pre-check voor Flame (ongewijzigd)
  pre_tasks:
    - name: "Check of Flame container al bestaat"
      ansible.builtin.command: docker ps -a --format '{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false
      failed_when: false

  roles:
    # 1. 🏗️ De Fundering
    - role: common
    - role: security
    - role: fail2ban
    - role: docker
    - role: uptime_kuma

    # 2. 📂 Data & Infrastructuur (Eerst de basis leggen)
    - role: duckdns
    - role: portainer
    - role: dozzle
    - role: postgres    # Database MOET draaien voor de rest

    # 3. 🔐 Applicaties & SSO
    # We draaien Authentik direct na Postgres
    - role: authentik

    # 4. 🛡️ De Poortwachter (Nu pas Caddy, als alles erachter leeft)
    - role: caddy

    # 5. ⚡ Overige Services
    - role: vaultwarden
    - role: mosquitto
    - role: gotify
    - role: loggifly

    # 6. 🔍 Hardware & Bridges
    - { role: zigbee2mqtt, when: "zigbee_device is defined" }
    - { role: zwavejsui,   when: "zwave_device is defined" }

    # 7. 🧠 Het Brein & Dashboards
    - role: homeassistant
    - role: esphome
    - { role: flame, when: "'flame' not in running_containers.stdout" }

    # 8. 📂 Backups
    - role: rsync
    - role: rclone

  tasks:
    - name: "🔍 Voer de finale Systeem Healthcheck uit"
      ansible.builtin.include_tasks: roles/common/tasks/healthcheck.yml
      tags: [healthcheck, install]
