---
- name: Configureer Homelab Server
  hosts: all
  become: yes
  roles:
    # 1. Basis & Infrastructuur
    - role: security
    - role: docker
    - role: fail2ban
    - role: portainer

    # 2. Opslag & Backup
    - role: rsync
    - role: rclone

    # 3. Databases & Communicatie
    - role: postgres
    - role: mosquitto

    # 4. Dashboards & Apps (Bridge Mode)
    - role: flame

    # 5. Hardware Detectie & Bridges
    - role: hardware_discovery
    - role: zigbee2mqtt
      when: zigbee_device is defined
    - role: zwavejsui
      when: zwave_device is defined
    - role: rtl_433
      when: rf_sdr_device is defined
    - role: matter_server
      when: matter_device is defined

    # 6. Het Brein
    - role: homeassistant
    - role: esphome

    # 7. De Poortwachter (Caddy als allerlaatste)
    - role: duckdns
    - role: caddy
