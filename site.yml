---
- name: Configureer Homelab Server
  hosts: homeserver
  become: yes
  gather_facts: yes

  # 🔍 We checken EERST of de Flame container bestaat vóórdat we rollen uitvoeren
  pre_tasks:
    - name: "Check of Flame container al bestaat"
      # We zetten de format string tussen {% raw %} zodat Ansible er niet aan komt
      ansible.builtin.command: docker ps -a --format '{% raw %}{{.Names}}{% endraw %}'
      register: running_containers
      changed_when: false
      failed_when: false

  roles:
    # 1. 🏗️ De Fundering
    - role: common
    - role: security
    - role: fail2ban
    - role: docker
    - role: uptime_kuma

    # 2. 🛡️ De Poortwachter
    - role: duckdns
    - role: caddy
    - role: portainer

    # 3. 🔐 Applicaties & Data
    - role: vaultwarden
    - role: postgres
    - role: mosquitto
    - role: gotify
    - role: loggifly

    # 4. 🔍 Hardware & Bridges
    - { role: zigbee2mqtt, when: "zigbee_device is defined" }
    - { role: zwavejsui,   when: "zwave_device is defined" }

    # 5. 🧠 Het Brein & Dashboards
    - role: homeassistant
    - role: esphome
    
    # 🔥 DE VEILIGHEIDSKLEP: Flame wordt ALLEEN uitgevoerd als de naam 'flame' 
    # NIET voorkomt in de lijst van actieve/bestaande containers.
    - { role: flame, when: "'flame' not in running_containers.stdout" }

    # 6. 📂 Backups
    - role: rsync
    - role: rclone

  tasks:
    - name: "🔍 Voer de finale Systeem Healthcheck uit"
      ansible.builtin.include_tasks: roles/common/tasks/healthcheck.yml
      tags: [healthcheck, install]
