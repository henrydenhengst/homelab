---
- name: Configureer Homelab Server
  hosts: homeserver
  become: yes
  gather_facts: yes

  roles:
    # 1. 🏗️ De Fundering (OS & Docker)
    - role: common
    - role: security
    - role: fail2ban
    - role: docker
    
    # 2. 🛡️ De Poortwachter (Nu naar voren gehaald!)
    # Zodra de proxy draait, zijn de volgende apps direct 'live'
    - role: duckdns
    - role: caddy
    - role: portainer

    # 3. 💾 Data & Communicatie
    - role: postgres
    - role: mosquitto

    # 4. 🔍 Hardware & Bridges
    - { role: zigbee2mqtt, when: "zigbee_device is defined" }
    - { role: zwavejsui,   when: "zwave_device is defined" }

    # 5. 🧠 Het Brein & Dashboards
    - role: homeassistant
    - role: esphome
    - role: flame

    # 6. 📂 Backups (Als laatste, mag mislukken zonder de rest te storen)
    - role: rsync
    - role: rclone
