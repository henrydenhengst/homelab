---
# --- Persoonlijke Gegevens & Locatie ---
main_user: "jouw_gebruikersnaam"
timezone: "Europe/Amsterdam"
acme_email: "je-email@example.com"

# --- DuckDNS & Netwerk ---
duckdns_domain: "jouwsubdomein"          # Alleen de naam, zonder .duckdns.org
duckdns_token: "jouw-duckdns-token-hier"
docker_network_name: "t2_network"

# --- Hardware & Mounts ---
usb_backup_uuid: "vul-hier-uuid-van-usb-in"
usb_mount_path: "/mnt/backup-usb"
zigbee_device: "/dev/serial/by-id/usb-xxxx_xxxx_xxxx"

# --- Applicatie Wachtwoorden ---
db_password: "verander_dit_wachtwoord"
flame_password: "verander_dit_wachtwoord"

# --- Flame Dashboard Instellingen ---
flame_city: "Stad"
flame_lat_long: "52.0000, 4.0000"
flame_theme: "dark"

# --- Subdomeinen (Caddy / Reverse Proxy) ---
flame_subdomain: "dashboard"
ha_subdomain: "ha"
zigbee_subdomain: "zigbee"
esphome_subdomain: "esphome"
portainer_subdomain: "portainer"

# --- Vault & Database ---
vaultwarden_admin_token: "genereer-een-sterk-token-met-openssl"
vault_postgres_user: "db_user"
vault_postgres_password: "verander_dit_wachtwoord"
vault_rclone_token: '{"access_token":"plak-hier-je-geanonimiseerde-rclone-json"}'
