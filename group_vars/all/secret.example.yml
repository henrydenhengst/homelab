---
# --- User & Location Settings ---
main_user: "username"
timezone: "Europe/Amsterdam"
acme_email: "your-email@example.com"

# --- DuckDNS & Network ---
duckdns_domain: "yourdomain"          # Only the name, without .duckdns.org
duckdns_token: "00000000-0000-0000-0000-000000000000"
docker_network_name: "t2_network"

# --- Hardware & Mounts ---
usb_backup_uuid: "00000000-0000-0000-0000-000000000000"
usb_mount_path: "/mnt/backup-usb"
zigbee_device: "/dev/serial/by-id/usb-xxxx_USB_Serial-xxxx"

# --- Application Passwords ---
db_password: "StrongPassword123!"
flame_password: "StrongPassword123!"
mqtt_password: "StrongPassword123!"
gotify_password: "StrongPassword123!"
caddy_admin_user: "admin_user"
caddy_admin_password_hash: "$2a$14$GeneratedHashHere..."
mqtt_admin_password: "StrongPassword123!"
# The hash (actually used by Caddy for authentication)
mqtt_admin_hash: "$2a$14$GeneratedHashHere..."

# --- Flame Dashboard Settings ---
flame_city: "CityName"
flame_lat_long: "00.0000, 0.0000"
flame_theme: "dark"

# --- HACS variables ---
vault_home_lat: 00.0000
vault_home_lon: 0.0000
vault_postcode: "1234AB"
vault_gotify_token: "YourGotifyTokenHere"
vault_gotify_url: "https://gotify.yourdomain.duckdns.org"

# --- Base paths for HACS ---
docker_base_path: "/opt"
# --- Paths for HACS and Home Assistant ---
ha_config_dir: "{{ docker_base_path }}/homeassistant"

# --- Subdomains (Caddy / Reverse Proxy) ---
flame_subdomain: "yourdomain"
ha_subdomain: "ha"
zigbee_subdomain: "zigbee"
esphome_subdomain: "esphome"
mqtt_subdomain: "mqtt"
vault_subdomain: "vault"
portainer_subdomain: "portainer"
gotify_subdomain: "gotify"

# --- Vault & Database ---
vaultwarden_admin_token: "YourVaultwardenAdminTokenHere"
vault_postgres_user: "db_user"
vault_postgres_password: "StrongPassword123!"
vault_rclone_token: '{"access_token":"your-rclone-access-token","token_type":"Bearer","refresh_token":"your-rclone-refresh-token","expiry":"2026-01-01T00:00:00+01:00"}'
