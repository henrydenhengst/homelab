---
# --- Persoonlijke Gegevens & Locatie ---
main_user: "your_user_name"
timezone: "Europe/Amsterdam"
acme_email: "your_email_address"

# --- DuckDNS & Netwerk ---
duckdns_domain: "your_domain_name"          # Alleen de naam, zonder .duckdns.org
duckdns_token: "your_duckdns_token"
docker_network_name: "homelab_network"

# --- Hardware & Mounts ---
usb_backup_uuid: "your_usb_uuid"
usb_mount_path: "/mnt/usb_disk"

# --- Applicatie Wachtwoorden ---
db_password: "change_me"
flame_password: "change_me"

# --- Flame Dashboard Instellingen ---
flame_city: "your_city"
flame_lat_long: "52.3, 4.6"                # Voorbeeld: Breedte, Lengte
flame_theme: "dark"

# --- Subdomeinen (Caddy / Reverse Proxy) ---
flame_subdomain: "flame"
ha_subdomain: "ha"
zigbee_subdomain: "zigbee"
esphome_subdomain: "esphome"
portainer_subdomain: "portainer"

# --- Vault & Database ---
vault_postgres_user: "vault_user"
vault_postgres_password: "change_me"
vault_rclone_token: '{"token":"change_me"}'
