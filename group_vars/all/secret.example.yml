# --- Gebruikersgegevens & Locatie ---
main_user: "username"
timezone: "Europe/Amsterdam"
acme_email: "your-email@example.com"

# --- DuckDNS & Netwerk ---
duckdns_domain: "yourdomain"           # Alleen de naam, zonder .duckdns.org
duckdns_token: "00000000-0000-0000-0000-000000000000"
docker_network_name: "t2_network"

# --- Hardware & Mounts ---
usb_backup_uuid: "uuid-van-jouw-schijf"
usb_mount_path: "/mnt/backup-usb"
zigbee_device: "/dev/serial/by-id/usb-xxxx_USB_Serial-xxxx"

# --- Applicatie Wachtwoorden ---
db_password: "SterkWachtwoord123!"
flame_password: "SterkWachtwoord123!"
mqtt_password: "SterkWachtwoord123!"
gotify_password: "SterkWachtwoord123!"
caddy_admin_user: "admin_user"
caddy_admin_password_hash: "$2a$14$GegenereerdeHashHier..."
mqtt_admin_password: "SterkWachtwoord123!"
mqtt_admin_hash: "$2a$14$GegenereerdeHashHier..."

# --- Flame Dashboard Instellingen ---
flame_city: "CityName"
flame_lat_long: "00.0000, 0.0000"
flame_theme: "dark"

# --- Subdomeinen (Caddy / Reverse Proxy) ---
flame_subdomain: "dashboard"
ha_subdomain: "ha"
zigbee_subdomain: "zigbee"
esphome_subdomain: "esphome"
mqtt_subdomain: "mqtt"
vault_subdomain: "vault"
portainer_subdomain: "portainer"
gotify_subdomain: "gotify"

# --- Vault & Database ---
vaultwarden_admin_token: "SuperGeheimTokenHier..."
vault_postgres_user: "db_user"
vault_postgres_password: "SterkWachtwoord123!"
vault_rclone_token: '{"token":"vervangen"}'
