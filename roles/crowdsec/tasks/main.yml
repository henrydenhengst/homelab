---
- name: Maak directories voor CrowdSec
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ main_user }}"
    mode: '0755'
  loop:
    - /opt/crowdsec
    - /opt/crowdsec/config
    - /opt/crowdsec/data

- name: Start CrowdSec container
  docker_container:
    name: crowdsec
    image: crowdsecurity/crowdsec:latest
    state: started
    restart_policy: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/caddy crowdsecurity/base-http-scenarios"
    volumes:
      - /opt/crowdsec/config:/etc/crowdsec
      - /opt/crowdsec/data:/var/lib/crowdsec
      - /var/log:/var/log:ro
      - /opt/caddy/access.log:/var/log/caddy/access.log:ro

- name: Wacht tot CrowdSec LAPI klaar is
  wait_for:
    timeout: 10

- name: Check of de bouncer al geregistreerd is
  shell: docker exec crowdsec cscli bouncers list -o json
  register: bouncer_list
  changed_when: false

- name: Genereer nieuwe API key als deze nog niet bestaat
  shell: docker exec crowdsec cscli bouncers add firewall-bouncer -o json
  register: bouncer_key_output
  when: bouncer_list.stdout == "null" or "'firewall-bouncer' not in bouncer_list.stdout"

- name: Installeer de Bouncer op de host
  apt:
    name: crowdsec-firewall-bouncer-iptables
    state: present

- name: Configureer de Bouncer met de nieuwe key
  lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer-iptables.yaml
    regexp: '^api_key:.*'
    line: "api_key: {{ (bouncer_key_output.stdout | from_json).api_key }}"
  # Alleen uitvoeren als we daadwerkelijk een nieuwe key hebben gegenereerd
  when: bouncer_key_output is changed and bouncer_key_output.stdout is defined
  notify: Restart CrowdSec Bouncer

- name: Zorg dat de API URL naar de Docker container wijst
  lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer-iptables.yaml
    regexp: '^api_url:.*'
    line: "api_url: http://127.0.0.1:8080/"
  notify: Restart CrowdSec Bouncer
