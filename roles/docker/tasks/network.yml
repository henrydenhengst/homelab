---
- name: "🌐 Maak het IOT netwerk aan (Frontend)"
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    driver: bridge
    state: present

- name: "🔒 Maak het Database netwerk aan (Backend)"
  community.docker.docker_network:
    name: "db_internal"
    driver: bridge
    internal: yes  # <--- Dit netwerk heeft GEEN toegang tot internet!
    state: present
