---
# ===============================================================
# UNIVERSAL HEADLESS HARDENING & CLEANUP (DEBIAN, REDHAT, ARCH)
# De Henry-standaard voor een Lean & Mean server
# ===============================================================

# 1️⃣ Variabelen definiëren op basis van OS-familie
- name: "Systeem-specifieke pakketlijsten laden"
  set_fact:
    headless_packages: >-
      {% if ansible_os_family == 'Debian' %}{{ headless_packages_debian }}
      {% elif ansible_os_family == 'RedHat' %}{{ headless_packages_redhat }}
      {% elif ansible_os_family == 'Archlinux' %}{{ headless_packages_arch }}
      {% else %}[]{% endif %}
    display_managers: >-
      {% if ansible_os_family == 'Debian' %}{{ display_managers_debian }}
      {% elif ansible_os_family == 'RedHat' %}{{ display_managers_redhat }}
      {% elif ansible_os_family == 'Archlinux' %}{{ display_managers_arch }}
      {% else %}[]{% endif %}
  vars:
    # --- DEBIAN / UBUNTU ---
    headless_packages_debian:
      - xserver-xorg
      - x11-common
      - xauth
      - xinit
      - gdm3
      - lightdm
      - cups
      - rpcbind
      - nfs-common
      - telnet
      - ftp
      - avahi-daemon
      - apache2
      - fonts-dejavu-core
      - texlive*
      - ruby*
    display_managers_debian: [gdm3, lightdm, kdm, lxdm]

    # --- REDHAT / CENTOS / ALMA / FEDORA ---
    headless_packages_redhat:
      - xorg-x11-server-Xorg
      - xorg-x11-xauth
      - gdm
      - lightdm
      - cups
      - rpcbind
      - nfs-utils
      - telnet
      - vsftpd
      - avahi
      - httpd
    display_managers_redhat: [gdm, kdm, lxdm, lightdm]

    # --- ARCH LINUX ---
    headless_packages_arch:
      - xorg-server
      - xorg-xauth
      - xorg-xinit
      - gdm
      - sddm
      - lightdm
      - cups
      - nfs-utils
      - inetutils
      - avahi
      - apache
    display_managers_arch: [gdm, sddm, lightdm, lxdm]

# 2️⃣ De grote schoonmaak (Pakketten verwijderen)
- name: "Verwijder GUI, Multimedia en Legacy pakketten ({{ ansible_os_family }})"
  package:
    name: "{{ headless_packages }}"
    state: absent
  register: remove_result
  when: headless_packages | length > 0

# 3️⃣ Specifieke Debian opschoning (Purge & Autoremove)
- name: "Schoon restanten op (Alleen Debian)"
  apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

# 4️⃣ Stop en Disable alle mogelijke Display Managers
- name: "Schakel grafische login (Display Managers) uit"
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop: "{{ display_managers }}"
  ignore_errors: yes
  when: display_managers | length > 0

# 5️⃣ Forceer Headless Boot (Console mode)
- name: "Zet systeem standaard op Multi-User Target (Headless boot)"
  systemd:
    default_target: multi-user.target
  register: systemd_result

# 6️⃣ Essentiële tools die ELKE server nodig heeft (Universeel)
- name: "Zorg dat minimale beheer-tools aanwezig zijn"
  package:
    name:
      - curl
      - git
      - htop
      - ncdu
      - ufw
      - fail2ban
      - bluez
    state: present

# 7️⃣ Feedback over de status
- name: "Status rapportage"
  debug:
    msg: 
      - "Systeem: {{ ansible_distribution }} ({{ ansible_os_family }})"
      - "Status: Lean & Mean!"
      - "Boot target: {{ systemd_result.msg | default('Reeds ingesteld op multi-user') }}"
      - "Wijzigingen doorgevoerd: {{ remove_result.changed }}"
