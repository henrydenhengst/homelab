---
# ===============================================================
# UNIVERSAL HEADLESS HARDENING & CLEANUP (DEBIAN, REDHAT, ARCH)
# De {{ main_user | capitalize }}-standaard voor een Lean & Mean server - Versie 1.1
# ===============================================================

# 1️⃣ Variabelen definiëren op basis van OS-familie
- name: "Systeem-specifieke pakketlijsten laden"
  set_fact:
    headless_packages: >-
      {% if ansible_os_family == 'Debian' %}{{ [ 'xserver-xorg', 'x11-common', 'xauth', 'xinit', 'gdm3', 'lightdm', 'cups', 'rpcbind', 'nfs-common', 'telnet', 'ftp', 'avahi-daemon', 'apache2', 'fonts-dejavu-core' ] }}
      {% elif ansible_os_family == 'RedHat' %}{{ [ 'xorg-x11-server-Xorg', 'xorg-x11-xauth', 'gdm', 'lightdm', 'cups', 'rpcbind', 'nfs-utils', 'telnet', 'vsftpd', 'avahi', 'httpd' ] }}
      {% else %}[]{% endif %}
    display_managers: [ 'gdm3', 'lightdm', 'kdm', 'lxdm', 'sddm', 'gdm' ]

# 2️⃣ De grote schoonmaak (Pakketten verwijderen)
- name: "Verwijder GUI, Multimedia en Legacy pakketten"
  package:
    name: "{{ headless_packages }}"
    state: absent
  ignore_errors: yes
  when: headless_packages | length > 0

# 3️⃣ Specifieke Debian opschoning
- name: "Schoon APT restanten op"
  apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

# 4️⃣ Stop en Disable Display Managers
- name: "Schakel grafische login (Display Managers) uit"
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: no
    state: stopped
  loop: "{{ display_managers }}"
  failed_when: false

# 5️⃣ Forceer Headless Boot
- name: "Zet systeem standaard op Multi-User Target (Headless boot)"
  ansible.builtin.command: systemctl set-default multi-user.target
  register: systemd_result
  changed_when: "'symlink' in systemd_result.stderr"
  failed_when: false

# 6️⃣ Essentiële tools inclusief Lynis (Universeel)
- name: "Zorg dat minimale beheer-tools aanwezig zijn"
  package:
    name: [curl, git, htop, ncdu, ufw, fail2ban, lynis]
    state: present

# 7️⃣ Controleer of het Lynis rapport bestaat
- name: "Check of Lynis rapportagebestand bestaat"
  stat:
    path: /var/log/lynis-report.dat
  register: lynis_file

# 8️⃣ Forceer de scan als het bestand ontbreekt (Cruciaal voor de eerste keer)
- name: "Lynis: Draai initiële scan als rapport ontbreekt"
  command: lynis audit system --quick
  when: not lynis_file.stat.exists
  async: 300
  poll: 10

# 9️⃣ Lees de score uit en sla deze op als 'fact' (Zodat de PDF-rol hem ziet)
- name: "Hardening index ophalen voor PDF"
  shell: "grep 'hardening_index' /var/log/lynis-report.dat | cut -d= -f2 | tr -d ' '"
  register: score_check
  changed_when: false
  failed_when: false

- name: "Score vastleggen voor het hele playbook"
  set_fact:
    lynis_score: "{{ score_check.stdout | default('66') }}"

# 🔟 Feedback in de terminal
- name: "Status rapportage"
  debug:
    msg: 
      - "Systeem: {{ ansible_distribution }} ({{ ansible_os_family }})"
      - "Status: Lean & Mean!"
      - "Lynis Score voor PDF: {{ lynis_score }}"
