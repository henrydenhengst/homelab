---
- name: Maak directory voor Home Assistant configuratie
  file:
    path: "{{ docker_base_path }}/homeassistant"
    state: directory
    mode: '0755'

- name: Plaats Home Assistant configuratie
  template:
    src: configuration.yaml.j2
    dest: "{{ docker_base_path }}/homeassistant/configuration.yaml"
    mode: '0644'
    # 'force: no' zorgt dat je eigen wijzigingen in de UI niet worden overschreven.
    # Verander naar 'yes' als je de file puur vanuit Ansible wilt beheren.
    force: no 

- name: Start Home Assistant container
  docker_container:
    name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart_policy: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - "{{ docker_base_path }}/homeassistant:/config"
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro  # Nodig voor Bluetooth discovery
    env:
      TZ: "Europe/Amsterdam"
    state: started
