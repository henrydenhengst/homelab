---
- name: Zorg dat de data map schoon is
  file:
    path: "/opt/docker/flame/data"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'

- name: Verwijder stoorzenders (oude db/config)
  file:
    path: "/opt/docker/flame/data/{{ item }}"
    state: absent
  loop:
    - config.json
    - db.sqlite
  # Dit dwingt Flame om de apps.yml opnieuw in te lezen

- name: Maak de definitieve apps.yml
  copy:
    dest: "/opt/docker/flame/data/apps.yml"
    owner: "1000"
    group: "1000"
    mode: '0644'
    content: |
      - name: "Beheer & Infrastructuur"
        items:
          - name: "Portainer"
            icon: "docker"
            url: "https://portainer.{{ duckdns_domain }}.duckdns.org"
            subtitle: "Container Management"
          - name: "Caddy"
            icon: "server-security"
            url: "https://{{ duckdns_domain }}.duckdns.org"
            subtitle: "Reverse Proxy Status"

      - name: "Smart Home"
        items:
          - name: "Home Assistant"
            icon: "home-assistant"
            url: "https://ha.{{ duckdns_domain }}.duckdns.org"
            subtitle: "Woning Automatisering"
          - name: "Zigbee2MQTT"
            icon: "zigbee"
            url: "https://zigbee.{{ duckdns_domain }}.duckdns.org"
            subtitle: "Zigbee Netwerk"

      - name: "Systeem Status"
        items:
          - name: "Vaultwarden"
            icon: "lock"
            url: "https://vault.{{ duckdns_domain }}.duckdns.org"
            subtitle: "Wachtwoord Kluis"
  notify: Restart Flame

- name: Maak de settings.yml
  copy:
    dest: "/opt/docker/flame/data/settings.yml"
    owner: "1000"
    group: "1000"
    mode: '0644'
    content: |
      app:
        name: "Den Hengst Homelab"
        theme: "dark"
      search:
        enabled: true
        engine: "google"
      weather:
        enabled: true
        city: "Haarlem"
        location: "52.3874,4.6462"
        units: metric
  notify: Restart Flame

- name: Start Flame Dashboard container
  docker_container:
    name: flame
    image: "pawelmalak/flame:latest"
    state: started
    recreate: yes
    restart_policy: unless-stopped
    networks:
      - name: "t2_network"
    volumes:
      - "/opt/docker/flame/data:/app/data"
    published_ports:
      - "5005:5005"
    env:
      PASSWORD: "{{ flame_password }}"
