---
- name: Installeer UFW
  apt:
    name: ufw
    state: present

- name: Sta SSH toe (Cruciaal, anders sluit je jezelf buiten!)
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Sta Portainer toe (HTTPS)
  ufw:
    rule: allow
    port: '9443'
    proto: tcp

- name: Sta Flame Dashboard toe
  ufw:
    rule: allow
    port: '5005'
    proto: tcp

- name: Sta HTTP toe (voor SSL verificatie)
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Sta HTTPS toe (voor je apps)
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Zet de firewall aan
  ufw:
    state: enabled
    policy: deny
