---
- name: START DOZZLE
  community.docker.docker_container:
    name: "{{ dozzle_container_name }}"
    image: "{{ image_dozzle }}"
    state: started
    restart_policy: always
    pull: yes
    recreate: yes
    container_default_behavior: no_defaults
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env:
      TZ: "{{ timezone }}"
      DOZZLE_LEVEL: "info"
      DOZZLE_TAILSIZE: "300"
      DOZZLE_FILTER: "status=running"
      DOZZLE_NO_ANALYTICS: "true"
    labels:
      com.docker.compose.service: "dozzle"
    # Healthcheck verwijderd omdat Dozzle geen wget/curl aan boord heeft.
    # Dit haalt het rode uitroepteken in ctop weg.

- name: Bevestig dat Dozzle container draait
  community.docker.docker_container_info:
    name: "{{ dozzle_container_name }}"
  register: dozzle_info
  failed_when: not dozzle_info.exists or not dozzle_info.container.State.Running
