---
- name: "Homelab Full Backup Suite"
  hosts: server
  become: yes
  
  # DIT IS DE FIX: Expliciet de geheimen inladen
  vars_files:
    - "../group_vars/all/secret.yml"

  tasks:
    # STAP 1: Fysieke check
    - name: "Check: Is de USB schijf fysiek aanwezig?"
      ansible.builtin.stat:
        path: "{{ usb_device }}"
      register: disk_present

    - name: "Fail: Stop als schijf niet is aangesloten"
      ansible.builtin.fail:
        msg: "De USB schijf op {{ usb_device }} is niet gevonden!"
      when: not disk_present.stat.exists

    # STAP 2: Mount check & herstel
    - name: "Check: Is de schijf gemount op {{ usb_mount_path }}?"
      ansible.builtin.command: mountpoint -q {{ usb_mount_path }}
      register: is_mounted
      failed_when: false
      changed_when: false

    - name: "Mount: Koppel de schijf als dat nog niet zo is"
      ansible.builtin.mount:
        path: "{{ usb_mount_path }}"
        src: "{{ usb_device }}"
        fstype: ext4  # Pas aan naar 'ntfs' of 'vfat' indien nodig
        state: mounted
      when: is_mounted.rc != 0

    # STAP 3: De Backup (Lokaal via Rsync)
    - name: "Backup: Synchroniseer Home Assistant data"
      ansible.builtin.shell:
        cmd: "rsync -av --delete {{ backup_source_dir }}/ {{ usb_mount_path }}/homelab_backup/"
      register: rsync_result

    # STAP 4: Notificatie naar jouw Gotify
    - name: "Notify: Stuur status naar Gotify"
      ansible.builtin.uri:
        url: "{{ vault_gotify_url }}/message?token={{ vault_gotify_token }}"
        method: POST
        body_format: json
        body:
          title: "💾 Backup Rapport Haarlem"
          message: "Succesvolle backup van {{ backup_source_dir }} naar USB ({{ usb_device }}). Status: {{ rsync_result.rc }}"
          priority: 5
      when: rsync_result.rc == 0
      ignore_errors: yes
