# playbooks/lynis_hardening.yml
---
- name: "🔐 Lynis Hardening - Volledige systeembeveiliging (met SSH-poort wijziging)"
  hosts: all
  become: yes
  vars:
    # --- CONFIGURATIE (PAS HIER AAN) ---
    ssh_port: 59612  # Jouw gekozen poort
    backup_base: "/root/lynis_backups"
    backup_dir: "{{ backup_base }}/{{ ansible_date_time.date }}"
    target_hardening_score: 80

  tasks:
    # --- DEEL 0: BACKUP & VOORBEREIDING ---
    - name: "Maak backup base directory aan"
      ansible.builtin.file:
        path: "{{ backup_base }}"
        state: directory
        mode: '0700'

    - name: "Maak backup datum directory aan"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'

    - name: "Backup originele SSH config (met direct pad)"
      ansible.builtin.copy:
        src: /etc/ssh/sshd_config
        dest: "/root/lynis_backups/{{ ansible_date_time.date }}/sshd_config.orig"
        remote_src: yes
        owner: root
        group: root
        mode: '0600'
      register: ssh_backup_result
      ignore_errors: yes  # Negeer fouten in check-mode

    - name: "Backup originele UFW regels"
      ansible.builtin.shell: "ufw status numbered > /root/lynis_backups/{{ ansible_date_time.date }}/ufw_status.orig"
      changed_when: false
      ignore_errors: yes
      args:
        creates: "/root/lynis_backups/{{ ansible_date_time.date }}/ufw_status.orig"

    # --- DEEL 1: SSH HARDENING ---
    - name: "SSH: Hardening instellingen toepassen"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: yes
      loop:
        - { regexp: '^#?Port', line: "Port {{ ssh_port }}" }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
        - { regexp: '^#?MaxSessions', line: 'MaxSessions 2' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^#?AllowTcpForwarding', line: 'AllowTcpForwarding no' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^#?AllowAgentForwarding', line: 'AllowAgentForwarding no' }
        - { regexp: '^#?LogLevel', line: 'LogLevel VERBOSE' }
        - { regexp: '^#?Compression', line: 'Compression no' }
        - { regexp: '^#?TCPKeepAlive', line: 'TCPKeepAlive no' }
      notify: restart ssh
      register: ssh_changes

    - name: "Controleer SSH config syntax"
      ansible.builtin.command: sshd -t
      register: sshd_test
      changed_when: false
      when: ssh_changes.changed

    # --- DEEL 2: KERNEL HARDENING (sysctl) ---
    - name: "Kernel: Hardening parameters toepassen"
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.d/99-hardening.conf
      loop:
        - { name: 'net.ipv4.ip_forward', value: '0' }
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
        - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_source_route', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
        - { name: 'net.ipv4.tcp_timestamps', value: '0' }
        - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
        - { name: 'kernel.randomize_va_space', value: '2' }
        - { name: 'fs.suid_dumpable', value: '0' }
        - { name: 'kernel.kptr_restrict', value: '1' }
        - { name: 'kernel.dmesg_restrict', value: '1' }
        - { name: 'kernel.printk', value: '3 3 3 3' }

    # --- DEEL 3: ROOTKIT SCANNERS ---
    - name: "Security: Installeer rootkit scanners"
      ansible.builtin.apt:
        name:
          - rkhunter
          - chkrootkit
          - aide
          - clamav
          - clamav-daemon
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: "RKHunter: Update properties"
      ansible.builtin.command: rkhunter --propupd
      when: ansible_os_family == "Debian"

    # --- DEEL 4: FIREWALL VERDER HARDENEN ---
    - name: "UFW: Sta nieuwe SSH-poort toe"
      community.general.ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        proto: tcp
      loop:
        - { rule: 'allow', port: '{{ ssh_port }}' }
        - { rule: 'deny', port: '22' }

    - name: "UFW: Rate limiting voor SSH"
      community.general.ufw:
        rule: limit
        port: "{{ ssh_port }}"
        proto: tcp

    # --- DEEL 5: FAIL2BAN OPTIMALISEREN ---
    - name: "Fail2ban: SSH jail aanpassen voor nieuwe poort"
      ansible.builtin.lineinfile:
        path: /etc/fail2ban/jail.local
        regexp: '^port\s*='
        line: "port = {{ ssh_port }}"
        create: yes
      notify: restart fail2ban
      when: ssh_port != 22

    # --- DEEL 6: NIEUWE LYNS AUDIT NA HARDENING ---
    - name: "Draai nieuwe Lynis audit na hardening"
      ansible.builtin.command: "lynis audit system --quiet --no-colors"
      register: lynis_after
      changed_when: false
      ignore_errors: yes

    - name: "Haal nieuwe hardening index op"
      ansible.builtin.shell: "lynis audit system --quiet --no-colors | grep 'Hardening index' | awk '{print $NF}'"
      register: new_score
      changed_when: false

    - name: "Toon resultaten"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "🔐 SSH poort gewijzigd naar: {{ ssh_port }}"
          - "🔥 UFW firewall geüpdatet voor poort {{ ssh_port }}"
          - "📊 Nieuwe hardening index: {{ new_score.stdout | default('onbekend') }}"
          - "✅ Alle hardening maatregelen toegepast"
          - "⚠️ Vergeet niet je SSH verbinding te testen: ssh -p {{ ssh_port }} {{ ansible_user }}@{{ inventory_hostname }}"
          - "=========================================="

  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
